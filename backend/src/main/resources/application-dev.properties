# =============================================
# application-dev.properties
# Development profile — verbose logging, SQL visible
# =============================================
spring.profiles.active=dev
spring.application.name=pravarthana-hrms-backend-dev

# ── Database (Supabase Dev / Local) ─────────────────────────────
# Use the same Supabase URL or a local PostgreSQL for dev
spring.datasource.url=${SUPABASE_URL:jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?sslmode=require}
spring.datasource.username=${SUPABASE_USERNAME:postgres.ubbnkuykcztnnqthtsuy}
spring.datasource.password=${SUPABASE_PASSWORD:Pravarthana@2026!}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ─────────────────────────────────────────────
# ddl-auto=none — schema managed via 04_saas_migration.sql only
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway (disabled — manual SQL migration) ─────────────────────
spring.flyway.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

# ── JWT ─────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:mySecretKeyForJWT2024PravarthanaHRMSMustBeAtLeast256BitsLong!@#$%}
jwt.expiration=86400000

# ── CORS ────────────────────────────────────────────────────────
cors.allowed-origins=http://localhost:3000,http://localhost:3001

# ── Logging ─────────────────────────────────────────────────────
logging.level.com.pravarthana.hrms=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
