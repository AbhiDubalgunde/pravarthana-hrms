# =============================================
# Server Configuration
# =============================================
server.port=8081
spring.application.name=pravarthana-hrms-backend

# =============================================
# Database Configuration (Supabase PostgreSQL)
# =============================================
# REPLACE WITH YOUR SUPABASE CREDENTIALS
spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?sslmode=require
spring.datasource.username=postgres.ubbnkuykcztnnqthtsuy
spring.datasource.password=Pravarthana@2026!
spring.datasource.driver-class-name=org.postgresql.Driver


# JPA/Hibernate
# IMPORTANT: ddl-auto=none — schema is managed manually via SQL migration scripts.
# Never use 'update' against Supabase — it causes connection-closed errors during DDL.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Flyway disabled — schema applied manually
spring.flyway.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

# =============================================
# JWT Configuration
# =============================================
jwt.secret=mySecretKeyForJWT2024PravarthanaHRMSMustBeAtLeast256BitsLong!@#$%
jwt.expiration=86400000

# =============================================
# CORS Configuration
# =============================================
cors.allowed-origins=http://localhost:3000,http://localhost:3001

# =============================================
# Logging
# =============================================
logging.level.com.pravarthana.hrms=INFO
logging.level.org.springframework.security=INFO
