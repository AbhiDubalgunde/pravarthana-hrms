# =============================================
# application-prod.properties
# Production profile — minimal logging, strict security
# =============================================
spring.profiles.active=prod
spring.application.name=pravarthana-hrms-backend

# ── Database (inject via environment variables in prod) ──────────
spring.datasource.url=${SUPABASE_URL}
spring.datasource.username=${SUPABASE_USERNAME}
spring.datasource.password=${SUPABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── HikariCP Connection Pool Tuning ─────────────────────────────
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ─────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JWT ─────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ── CORS (add your production domain) ───────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://pravarthana-hrms.vercel.app}

# ── Logging ─────────────────────────────────────────────────────
logging.level.com.pravarthana.hrms=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.root=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{requestId}] %-5level %logger{36} - %msg%n
